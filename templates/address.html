<!DOCTYPE html>
<html>
<head>
<title>Select Address</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#141e30,#243b55);
    color: white;
}

/* TITLE */
h2 {
    text-align: center;
    padding: 10px;
}

/* MAP */
#map {
    height: 65vh;
    margin: 10px;
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.5);
}

/* INFO */
.info {
    text-align: center;
    font-size: 14px;
    opacity: 0.8;
}

/* BUTTON */
.btn {
    display: block;
    width: 90%;
    margin: 10px auto;
    padding: 14px;
    border-radius: 15px;
    text-align: center;
    font-weight: bold;
    border: none;
}

/* COLORS */
.green {
    background: linear-gradient(90deg,#00c853,#2ecc71);
    color: white;
}

.blue {
    background: linear-gradient(90deg,#2196f3,#00bcd4);
    color: white;
}

/* BACK */
.back {
    text-align: center;
    display: block;
    margin-top: 10px;
    color: white;
    opacity: 0.7;
}

</style>
</head>

<body>

<h2>📍 Select Delivery Location</h2>

<div id="map"></div>

<p class="info">Tap map OR use current location</p>

<form method="POST" onsubmit="return validateLocation()">
    <input type="hidden" name="lat" id="lat">
    <input type="hidden" name="lng" id="lng">

    <button class="btn green">✅ Confirm Address</button>
</form>

<button class="btn blue" onclick="getLocation()">
📍 Use Current Location
</button>

<a href="/" class="back">⬅ Back</a>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// Default → Tharamangalam
var map = L.map('map').setView([11.6943, 77.9680], 14);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: 'Map data © OpenStreetMap'
}).addTo(map);

var marker;

// 📍 Click selection
map.on('click', function(e){
    setMarker(e.latlng.lat, e.latlng.lng);
});

// 📍 Set marker function
function setMarker(lat, lng){
    if(marker){
        map.removeLayer(marker);
    }

    marker = L.marker([lat, lng]).addTo(map);

    document.getElementById("lat").value = lat;
    document.getElementById("lng").value = lng;
}

// 📍 Current location button
function getLocation(){
    navigator.geolocation.getCurrentPosition(function(position){

        var lat = position.coords.latitude;
        var lng = position.coords.longitude;

        setMarker(lat, lng);
        map.setView([lat, lng], 15);

    }, function(){
        alert("❌ Location access denied");
    });
}

// 📍 Auto detect on load (best UX 🔥)
window.onload = function(){
    navigator.geolocation.getCurrentPosition(function(position){

        var lat = position.coords.latitude;
        var lng = position.coords.longitude;

        setMarker(lat, lng);
        map.setView([lat, lng], 15);

    });
};

// ✅ Validation
function validateLocation(){
    var lat = document.getElementById("lat").value;
    var lng = document.getElementById("lng").value;

    if(!lat || !lng){
        alert("⚠️ Please select a location first");
        return false;
    }

    return true;
}

</script>

</body>
</html>
