<!DOCTYPE html>
<html>
<head>
<title>Select Address</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#00c6ff,#0072ff);
    color: white;
    text-align: center;
}

h2 {
    margin: 10px;
}

#map {
    height: 420px;
    margin: 10px;
    border-radius: 15px;
}

#selected {
    font-size: 14px;
    margin-top: 8px;
}

button {
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    background: green;
    color: white;
    font-size: 16px;
    margin-top: 10px;
}

</style>
</head>

<body>

<h2>📍 Select Delivery Location</h2>

<div id="map"></div>

<p id="selected">⏳ Detecting your location...</p>

<form method="POST">
<input type="hidden" name="lat" id="lat">
<input type="hidden" name="lng" id="lng">
<input type="hidden" name="address" id="address">

<button type="submit">Confirm Location</button>
</form>

<script>

// 🟢 STORE LOCATION (THARAMANGALAM)
let centerLat = 11.6943;
let centerLng = 77.9680;

let map = L.map('map').setView([centerLat, centerLng], 14);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

let marker;

// 🟢 DELIVERY RADIUS
let circle = L.circle([centerLat, centerLng], {
    color: 'green',
    fillColor: '#2ecc71',
    fillOpacity: 0.2,
    radius: 3000
}).addTo(map);

// 🔥 AUTO CURRENT LOCATION
if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(pos){

        let lat = pos.coords.latitude;
        let lng = pos.coords.longitude;

        map.setView([lat, lng], 16);

        marker = L.marker([lat, lng]).addTo(map);

        document.getElementById("lat").value = lat;
        document.getElementById("lng").value = lng;

        document.getElementById("selected").innerHTML = "⏳ Detecting address...";

        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
        .then(res => res.json())
        .then(data => {

            let addr = data.address;

            let street =
                (addr.road || "") + ", " +
                (addr.suburb || "") + ", " +
                (addr.city || addr.town || "");

            document.getElementById("selected").innerHTML =
                "📍 " + street;

            document.getElementById("address").value = street;
        });

    }, function(){
        document.getElementById("selected").innerHTML = "❌ Location access denied";
    });
}

// 🖱️ CLICK TO SELECT
map.on('click', function(e){

    let lat = e.latlng.lat;
    let lng = e.latlng.lng;

    // ❌ OUTSIDE DELIVERY CHECK
    let distance = map.distance([centerLat, centerLng], [lat, lng]);

    if(distance > 3000){
        alert("❌ Outside delivery area");
        return;
    }

    if(marker){
        map.removeLayer(marker);
    }

    marker = L.marker([lat, lng]).addTo(map);

    document.getElementById("lat").value = lat;
    document.getElementById("lng").value = lng;

    document.getElementById("selected").innerHTML = "⏳ Getting address...";

    fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
    .then(res => res.json())
    .then(data => {

        let addr = data.address;

        let street =
            (addr.road || "") + ", " +
            (addr.suburb || "") + ", " +
            (addr.city || addr.town || "");

        document.getElementById("selected").innerHTML =
            "📍 " + street;

        document.getElementById("address").value = street;
    });

});

</script>

</body>
</html>
