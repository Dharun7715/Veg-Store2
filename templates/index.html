<!DOCTYPE html>
<html>
<head>
<title>GreenBasket</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#00c6ff,#0072ff);
}

/* HEADER */
.header {
    text-align: center;
    padding: 15px;
    color: white;
    font-size: 22px;
    font-weight: bold;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 10px;
}

.nav-btn {
    padding: 8px 12px;
    border-radius: 15px;
    color: white;
    text-decoration: none;
    font-size: 14px;
}

.cart { background: green; }
.orders { background: orange; }
.profile { background: purple; }
.admin { background: black; }
.logout { background: red; }

/* LOCATION */
.location-box {
    text-align: center;
    color: white;
    margin: 10px;
}

.loc-btn {
    background: linear-gradient(45deg,#00c853,#2ecc71);
    padding: 8px 15px;
    border-radius: 20px;
    border: none;
    color: white;
    font-weight: bold;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: 1fr;
    padding: 10px;
}

@media (min-width:600px){
    .container { grid-template-columns: repeat(2,1fr); }
}
@media (min-width:900px){
    .container { grid-template-columns: repeat(3,1fr); }
}

/* CARD */
.card {
    background: white;
    margin: 10px;
    padding: 15px;
    border-radius: 15px;
    text-align: center;
    position: relative;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.03);
}

/* SALE */
.sale {
    position: absolute;
    top: 10px;
    right: 10px;
    background: red;
    color: white;
    padding: 4px 10px;
    border-radius: 10px;
    font-size: 12px;
}

/* PRICE */
.old {
    text-decoration: line-through;
    color: gray;
}

.price {
    color: green;
    font-weight: bold;
}

.off {
    color: red;
    font-size: 12px;
}

/* BUTTON */
.add-btn {
    background: linear-gradient(45deg,#00c853,#2ecc71);
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 20px;
    font-weight: bold;
    cursor: pointer;
}

.qty-box {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

.qty-box button {
    background: #2ecc71;
    color: white;
    border: none;
    width: 30px;
    height: 30px;
    border-radius: 50%;
}

.qty {
    font-weight: bold;
}

</style>
</head>

<body>

<div class="header">🥦 GreenBasket</div>

<!-- NAVBAR -->
<div class="navbar">
    <a href="/cart" class="nav-btn cart">🛒 {{ cart_count }}</a>
    <a href="/orders" class="nav-btn orders">Orders</a>
    <a href="/profile" class="nav-btn profile">Profile</a>

    {% if is_admin %}
    <a href="/admin" class="nav-btn admin">Admin</a>
    {% endif %}

    <a href="/logout" class="nav-btn logout">Logout</a>
</div>

<!-- LOCATION -->
<div class="location-box">
<p id="locationText">📍 Select delivery location</p>
<button onclick="getLocation()" class="loc-btn">Use Current Location</button>
</div>

<!-- PRODUCTS -->
<div class="container">
{% for v in vegetables %}
<div class="card">

<span class="sale">🔥 SALE</span>

<h3>{{ v.name }}</h3>

<p>
<span class="old">₹{{ v.price + 10 }}</span>
<span class="price"> ₹{{ v.price }}</span>
<span class="off">(20% OFF)</span>
</p>

<div id="controls-{{ v.name }}">
{% if cart.get(v.name) %}
<div class="qty-box">
    <button onclick="decrease('{{ v.name }}')">−</button>
    <span class="qty">{{ cart[v.name] }}</span>
    <button onclick="increase('{{ v.name }}')">+</button>
</div>
{% else %}
<button onclick="addItem('{{ v.name }}')" class="add-btn">+ Add</button>
{% endif %}
</div>

</div>
{% endfor %}
</div>

<script>

// 📍 LOCATION (REAL ADDRESS)
function getLocation(){
    navigator.geolocation.getCurrentPosition(function(pos){

        let lat = pos.coords.latitude;
        let lng = pos.coords.longitude;

        document.getElementById("locationText").innerHTML = "⏳ Getting address...";

        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
        .then(res => res.json())
        .then(data => {

            let addr = data.address;

            let street =
                (addr.road || "") + ", " +
                (addr.suburb || "") + ", " +
                (addr.city || addr.town || "");

            document.getElementById("locationText").innerHTML =
                "📍 " + street;
        });

    }, function(){
        alert("Location access denied ❌");
    });
}

// 🛒 CART AJAX
function addItem(name){
    fetch('/add/'+name)
    .then(res=>res.json())
    .then(data=>{
        updateUI(name,data.qty,data.cart_count);
    });
}

function increase(name){
    fetch('/increase/'+name)
    .then(res=>res.json())
    .then(data=>{
        updateUI(name,data.qty,data.cart_count);
    });
}

function decrease(name){
    fetch('/decrease/'+name)
    .then(res=>res.json())
    .then(data=>{
        updateUI(name,data.qty,data.cart_count);
    });
}

function updateUI(name,qty,total){

    document.querySelector(".cart").innerText = "🛒 " + total;

    let div = document.getElementById("controls-"+name);

    if(qty==0){
        div.innerHTML = `<button onclick="addItem('${name}')" class="add-btn">+ Add</button>`;
    } else {
        div.innerHTML = `
        <div class="qty-box">
            <button onclick="decrease('${name}')">−</button>
            <span class="qty">${qty}</span>
            <button onclick="increase('${name}')">+</button>
        </div>
        `;
    }
}

</script>

</body>
</html>
