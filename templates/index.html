<!DOCTYPE html>
<html>
<head>
<title>GreenBasket</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#00c6ff,#0072ff);
}

/* HEADER */
.header {
    text-align: center;
    padding: 15px;
    font-size: 22px;
    font-weight: bold;
    color: white;
}

/* SEARCH */
.search-box {
    text-align: center;
}

.search-box input {
    width: 80%;
    padding: 10px;
    border-radius: 20px;
    border: none;
}

/* TOP BUTTONS */
.top-bar {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 10px;
}

.top-btn {
    padding: 8px 12px;
    border-radius: 15px;
    color: white;
    text-decoration: none;
}

.cart { background: green; }
.orders { background: orange; }
.profile { background: purple; }
.logout { background: red; }

/* LOCATION */
.location-box {
    text-align: center;
    color: white;
    margin: 10px;
}

.loc-btn {
    background: #2ecc71;
    padding: 8px 12px;
    border-radius: 10px;
    border: none;
    color: white;
}

.map-btn {
    background: #3498db;
    padding: 8px 12px;
    border-radius: 10px;
    color: white;
    text-decoration: none;
}

/* PRODUCT CARD */
.card {
    background: white;
    margin: 15px;
    padding: 15px;
    border-radius: 15px;
}

.sale {
    float: right;
    background: red;
    color: white;
    padding: 5px 10px;
    border-radius: 10px;
}

.price {
    color: green;
    font-weight: bold;
}

.old {
    text-decoration: line-through;
    color: gray;
}

.btn {
    background: green;
    padding: 8px 12px;
    border-radius: 10px;
    color: white;
    text-decoration: none;
    display: inline-block;
    margin-top: 8px;
}

</style>
</head>

<body>

<div class="header">🥦 Fresh Veg Store</div>

<!-- SEARCH -->
<div class="search-box">
<form method="GET">
<input type="text" name="search" placeholder="Search vegetables...">
</form>
</div>

<!-- TOP BUTTONS -->
<div class="top-bar">
    <a href="/cart" class="top-btn cart">🛒 {{ cart_count }}</a>
    <a href="/orders" class="top-btn orders">Orders</a>
    <a href="/profile" class="top-btn profile">Profile</a>
    <a href="/logout" class="top-btn logout">Logout</a>
</div>

<!-- LOCATION -->
<div class="location-box">
<p id="locationText">📍 Select your delivery location</p>

<button onclick="getLocation()" class="loc-btn">
📍 Use Current Location
</button>

<a href="/address" class="map-btn">
🗺️ Map
</a>
</div>

<!-- PRODUCTS -->
{% for v in vegetables %}
<div class="card">

<span class="sale">🔥 SALE</span>

<h3>{{ v.name }}</h3>

<p>
<span class="old">₹{{ v.price + 10 }}</span>
<span class="price"> ₹{{ v.price }}</span>
</p>

<a href="/add/{{ v.name }}" class="btn">Add to Cart</a>

</div>
{% endfor %}

<!-- JS -->
<script>
function getLocation(){
    navigator.geolocation.getCurrentPosition(function(position){

        var lat = position.coords.latitude;
        var lng = position.coords.longitude;

        document.getElementById("locationText").innerHTML = "⏳ Getting address...";

        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
        .then(res => res.json())
        .then(data => {
            document.getElementById("locationText").innerHTML =
                "📍 " + data.display_name;
        });

    });
}
</script>

</body>
</html>
