<!DOCTYPE html>
<html>
<head>
<title>GreenBasket</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#00c6ff,#0072ff);
}

/* HEADER */
.header {
    text-align: center;
    padding: 15px;
    font-size: 22px;
    color: white;
    font-weight: bold;
}

/* TOP BAR */
.top-bar {
    display: flex;
    justify-content: center;
    margin: 10px;
}

.cart {
    background: green;
    padding: 6px 12px;
    border-radius: 12px;
    color: white;
}

/* LOCATION */
.location-box {
    text-align: center;
    color: white;
}

.loc-btn, .map-btn {
    padding: 8px 12px;
    border-radius: 10px;
    border: none;
    color: white;
    margin: 5px;
}

.loc-btn { background: #2ecc71; }
.map-btn { background: #3498db; text-decoration: none; }

/* GRID */
.container {
    display: grid;
    grid-template-columns: 1fr;
    padding: 10px;
}

@media (min-width: 600px) {
    .container { grid-template-columns: repeat(2,1fr); }
}

@media (min-width: 900px) {
    .container { grid-template-columns: repeat(3,1fr); }
}

/* CARD */
.card {
    background: white;
    margin: 10px;
    padding: 15px;
    border-radius: 15px;
    text-align: center;
    position: relative;
}

/* SALE */
.sale {
    position: absolute;
    top: 10px;
    right: 10px;
    background: red;
    color: white;
    padding: 4px 10px;
    border-radius: 10px;
    font-size: 12px;
}

/* PRICE */
.old {
    text-decoration: line-through;
    color: gray;
}

.price {
    color: green;
    font-weight: bold;
}

.off {
    color: red;
    font-size: 12px;
}

/* BUTTON */
.btn {
    background: green;
    padding: 6px 12px;
    border-radius: 10px;
    color: white;
    border: none;
}

.qty {
    margin: 0 10px;
    font-weight: bold;
}

button {
    border: none;
    border-radius: 8px;
    padding: 5px 10px;
}

</style>
</head>

<body>

<div class="header">🥦 GreenBasket</div>

<div class="top-bar">
    <div class="cart">🛒 <span id="cartCount">{{ cart_count }}</span></div>
</div>

<!-- LOCATION -->
<div class="location-box">
<p id="locationText">📍 Select location</p>

<button onclick="getLocation()" class="loc-btn">Use Location</button>
<a href="/address" class="map-btn">Map</a>
</div>

<!-- PRODUCTS -->
<div class="container">
{% for v in vegetables %}
<div class="card">

<span class="sale">🔥 SALE</span>

<h3>{{ v.name }}</h3>

<p>
<span class="old">₹{{ v.price + 10 }}</span>
<span class="price"> ₹{{ v.price }}</span>
<span class="off">
({{ ((v.price+10 - v.price)*100 // (v.price+10)) }}% OFF)
</span>
</p>

<div id="controls-{{ v.name }}">
{% if cart.get(v.name) %}
    <button onclick="decrease('{{ v.name }}')">-</button>
    <span class="qty">{{ cart[v.name] }}</span>
    <button onclick="increase('{{ v.name }}')">+</button>
{% else %}
    <button onclick="addItem('{{ v.name }}')" class="btn">Add</button>
{% endif %}
</div>

</div>
{% endfor %}
</div>

<script>

// LOCATION
function getLocation(){
    navigator.geolocation.getCurrentPosition(function(pos){
        let lat = pos.coords.latitude;
        let lng = pos.coords.longitude;

        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`)
        .then(res => res.json())
        .then(data=>{
            document.getElementById("locationText").innerHTML = "📍 " + data.display_name;
        });
    });
}

// CART
function addItem(name){
    fetch('/add/'+name)
    .then(res=>res.json())
    .then(data=>{
        updateUI(name,data.qty,data.cart_count);
    });
}

function increase(name){
    fetch('/increase/'+name)
    .then(res=>res.json())
    .then(data=>{
        updateUI(name,data.qty,data.cart_count);
    });
}

function decrease(name){
    fetch('/decrease/'+name)
    .then(res=>res.json())
    .then(data=>{
        updateUI(name,data.qty,data.cart_count);
    });
}

function updateUI(name,qty,total){

    document.getElementById("cartCount").innerText = total;

    let div = document.getElementById("controls-"+name);

    if(qty==0){
        div.innerHTML = `<button onclick="addItem('${name}')" class="btn">Add</button>`;
    } else {
        div.innerHTML = `
        <button onclick="decrease('${name}')">-</button>
        <span class="qty">${qty}</span>
        <button onclick="increase('${name}')">+</button>
        `;
    }
}

</script>

</body>
</html>
