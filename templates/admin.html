<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color: white;
}

.container {
    max-width: 800px;
    margin: auto;
    padding: 15px;
}

/* HEADER */
h2 {
    text-align: center;
}

/* TOP CARDS */
.top {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

.top .card {
    flex: 1;
    text-align: center;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    padding: 18px;
    border-radius: 15px;
    margin-top: 15px;
}

/* ORDER */
.order-title {
    font-weight: bold;
}

.price {
    color: #2ecc71;
    font-weight: bold;
}

/* PROGRESS */
.progress {
    width: 100%;
    height: 8px;
    background: #ddd;
    border-radius: 10px;
    margin-top: 10px;
}

.bar {
    height: 100%;
    background: #2ecc71;
    border-radius: 10px;
}

/* FORM */
select {
    padding: 6px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 6px 12px;
    border-radius: 8px;
    border: none;
    background: #2ecc71;
    color: white;
    margin-left: 5px;
}

/* LOGOUT */
.logout {
    display: block;
    text-align: center;
    margin-top: 10px;
    color: #ff7675;
}

</style>
</head>

<body>

<div class="container">

<h2>👑 Admin Dashboard</h2>

<a href="/logout" class="logout">🔓 Logout</a>

<!-- TOP STATS -->
<div class="top">

<div class="card">
<h3>📦 Orders</h3>
<h2>{{ orders|length }}</h2>
</div>

<div class="card">
<h3>💰 Revenue</h3>
<h2>₹{{ revenue }}</h2>
</div>

</div>

<!-- GRAPH -->
<div class="card">
<h3>📊 Orders Analytics</h3>
<canvas id="ordersChart"></canvas>
</div>

<!-- ORDERS LIST -->
{% for o in orders %}

<div class="card">

<div class="order-title">
👤 {{ o[1] }}
</div>

<p>{{ o[2] }} × {{ o[3] }}</p>

<p class="price">₹{{ o[4] }}</p>

<!-- PROGRESS -->
<div class="progress">
<div class="bar"
style="width:
{% if o[5]=='Pending' %}25%
{% elif o[5]=='Out for Delivery' %}60%
{% elif o[5]=='Delivered' %}100%
{% else %}40%
{% endif %}
"></div>
</div>

<br>

<form method="POST" action="/update_status">

<input type="hidden" name="id" value="{{ o[0] }}">

<select name="status">
<option>Pending</option>
<option>Out for Delivery</option>
<option>Delivered</option>
</select>

<button>Update</button>

</form>

</div>

{% endfor %}

</div>

<script>

fetch('/admin_data')
.then(res => res.json())
.then(data => {

    const ctx = document.getElementById('ordersChart');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: data.labels,
            datasets: [{
                label: 'Orders',
                data: data.values
            }]
        },
        options: {
            responsive: true
        }
    });

});

</script>

</body>
</html>
