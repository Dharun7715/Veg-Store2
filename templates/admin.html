<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color: white;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 15px;
}

h2 {
    text-align: center;
}

/* TOP CARDS */
.top {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

.card {
    flex: 1;
    background: rgba(255,255,255,0.12);
    padding: 18px;
    border-radius: 15px;
    text-align: center;
}

/* GRAPH */
.graph-box {
    background: rgba(255,255,255,0.1);
    margin-top: 15px;
    padding: 15px;
    border-radius: 15px;
}

canvas {
    background: white;
    border-radius: 10px;
    margin-top: 10px;
}

/* ERROR TEXT */
.error {
    color: red;
    text-align: center;
    margin-top: 10px;
}

.logout {
    display: block;
    text-align: center;
    margin-top: 10px;
    color: #ff7675;
}

</style>
</head>

<body>

<div class="container">

<h2>👑 Admin Dashboard</h2>

<a href="/logout" class="logout">🔓 Logout</a>

<!-- TOP -->
<div class="top">

<div class="card">
<h3>📦 Orders</h3>
<h2>{{ orders|length }}</h2>
</div>

<div class="card">
<h3>💰 Revenue</h3>
<h2>₹{{ revenue }}</h2>
</div>

</div>

<!-- BAR GRAPH -->
<div class="graph-box">
<h3>📊 Orders Analytics</h3>
<canvas id="ordersChart"></canvas>
</div>

<!-- LINE GRAPH -->
<div class="graph-box">
<h3>📈 Revenue Trend</h3>
<canvas id="revenueChart"></canvas>
</div>

<div id="errorMsg" class="error"></div>

</div>

<script>

fetch('/admin_data')
.then(res => res.json())
.then(data => {

    console.log("DATA:", data);

    // ❌ If no data
    if (!data || data.labels.length === 0) {
        document.getElementById("errorMsg").innerText = "⚠️ No data available";
        return;
    }

    // 📊 BAR CHART
    new Chart(document.getElementById('ordersChart'), {
        type: 'bar',
        data: {
            labels: data.labels,
            datasets: [{
                label: 'Orders',
                data: data.values
            }]
        }
    });

    // 📈 LINE CHART
    new Chart(document.getElementById('revenueChart'), {
        type: 'line',
        data: {
            labels: data.daily_labels,
            datasets: [{
                label: 'Revenue ₹',
                data: data.daily_values,
                tension: 0.3
            }]
        }
    });

})
.catch(err => {
    console.log("ERROR:", err);
    document.getElementById("errorMsg").innerText = "❌ Graph load failed";
});

</script>

</body>
</html>
