<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #2c3e50, #4ca1af);
    color: white;
}

.container {
    max-width: 420px;
    margin: auto;
    padding: 15px;
}

h2 {
    text-align: center;
}

/* stats */
.stats {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
}

.box {
    background: rgba(255,255,255,0.1);
    padding: 12px;
    border-radius: 12px;
    width: 48%;
    text-align: center;
}

/* card */
.card {
    background: rgba(255,255,255,0.1);
    padding: 12px;
    margin: 12px 0;
    border-radius: 12px;
    backdrop-filter: blur(5px);
    animation: fadeIn 0.5s ease;
}

select, button {
    padding: 6px;
    margin-top: 6px;
    border-radius: 6px;
    border: none;
}

/* buttons */
button {
    background: #2ecc71;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #27ae60;
}

/* progress bar */
.bar {
    height: 8px;
    margin-top: 6px;
    border-radius: 5px;
    background: #ccc;
    overflow: hidden;
}

.fill {
    height: 100%;
    background: #2ecc71;
}

/* animation */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">

<h2>👑 Admin Dashboard</h2>

<div class="stats">
    <div class="box">
        <h3>{{ total_orders }}</h3>
        <p>Orders</p>
    </div>
    <div class="box">
        <h3>₹{{ total_revenue }}</h3>
        <p>Revenue</p>
    </div>
</div>

{% for id, u, item, qty, total, status in orders %}
<div class="card">

<p><b>{{ u }}</b></p>
<p>{{ item }} × {{ qty }}</p>
<p>₹{{ total }}</p>

<!-- PROGRESS BAR -->
<div class="bar">
    <div class="fill" style="
        width:
        {% if status == 'Pending' %}30%
        {% elif status == 'Out for Delivery' %}70%
        {% else %}100%
        {% endif %}
    "></div>
</div>

<form method="POST">
<input type="hidden" name="id" value="{{ id }}">

<select name="status">
<option {% if status=='Pending' %}selected{% endif %}>Pending</option>
<option {% if status=='Out for Delivery' %}selected{% endif %}>Out for Delivery</option>
<option {% if status=='Delivered' %}selected{% endif %}>Delivered</option>
</select>

<button>Update</button>
</form>

</div>
{% endfor %}

<a href="/" style="display:block;text-align:center;margin-top:15px;color:white;">⬅ Back</a>

</div>

</body>
</html>
