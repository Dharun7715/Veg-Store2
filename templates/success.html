<!DOCTYPE html>
<html>
<head>
<title>Order Success</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#00c9ff,#92fe9d);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.9);
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    width: 300px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    animation: pop 0.5s ease;
}

/* TITLE */
h2 {
    margin-bottom: 10px;
    color: #2ecc71;
}

/* TEXT */
p {
    color: #333;
    font-size: 14px;
}

/* BUTTON */
.btn {
    display: block;
    margin-top: 12px;
    padding: 10px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    font-weight: bold;
}

/* COLORS */
.home { background: #2ecc71; }
.orders { background: #ff9800; }

/* ANIMATION */
@keyframes pop {
    from { transform: scale(0); opacity:0; }
    to { transform: scale(1); opacity:1; }
}

/* ICON */
.tick {
    font-size: 40px;
    margin-bottom: 10px;
}

</style>
</head>

<body>

<div class="card">

<div class="tick">✅</div>

<h2>Order Placed!</h2>

<p>Your order has been placed successfully 🎉</p>
<p>Fresh vegetables will be delivered soon 🥦🚚</p>

<a href="/" class="btn home">🏠 Back to Home</a>
<a href="/orders" class="btn orders">📦 View Orders</a>

</div>

</body>
</html>
