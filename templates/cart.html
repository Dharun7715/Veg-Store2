<!DOCTYPE html>
<html>
<head>
<title>Your Cart</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#141e30,#243b55);
    color: white;
}

/* HEADER */
.header {
    text-align: center;
    padding: 15px;
    font-size: 22px;
    font-weight: bold;
}

/* CONTAINER */
.container {
    max-width: 500px;
    margin: auto;
    padding: 10px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.1);
    padding: 15px;
    margin: 10px 0;
    border-radius: 15px;
    backdrop-filter: blur(10px);
}

/* BUTTONS */
.btn {
    padding: 6px 12px;
    border-radius: 8px;
    border: none;
    color: white;
}

.plus { background: green; }
.minus { background: orange; }
.remove { background: red; }

.qty-box {
    margin-top: 10px;
}

/* TOTAL */
.total {
    font-size: 18px;
    text-align: center;
    margin-top: 20px;
}

/* CHECKOUT */
.checkout {
    display: block;
    width: 100%;
    padding: 12px;
    background: gold;
    color: black;
    border-radius: 10px;
    text-align: center;
    font-weight: bold;
    margin-top: 10px;
    text-decoration: none;
}

/* ANIMATION */
.loader {
    display: none;
    text-align: center;
    margin-top: 20px;
}

.spinner {
    border: 4px solid rgba(255,255,255,0.3);
    border-top: 4px solid white;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
    margin: auto;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

</style>
</head>

<body>

<div class="header">🛒 Your Cart</div>

<div class="container">

{% for item in items %}
<div class="card">

<h3>{{ item.name }}</h3>
<p>₹{{ item.price }} × {{ item.qty }}</p>
<p>Total: ₹{{ item.total }}</p>

<div class="qty-box">
<button class="btn plus" onclick="update('{{ item.name }}','increase')">+</button>
<button class="btn minus" onclick="update('{{ item.name }}','decrease')">-</button>
<button class="btn remove" onclick="removeItem('{{ item.name }}')">Remove</button>
</div>

</div>
{% endfor %}

<div class="total">
Total Amount: ₹{{ total }}
</div>

<button class="checkout" onclick="checkout()">💳 Checkout</button>

<div class="loader" id="loader">
<div class="spinner"></div>
<p>Placing your order...</p>
</div>

<a href="/" style="color:white;text-align:center;display:block;margin-top:10px;">← Back</a>

</div>

<script>

// UPDATE QTY
function update(name,type){
    fetch('/'+type+'/'+name)
    .then(()=>location.reload());
}

// REMOVE
function removeItem(name){
    fetch('/decrease/'+name)
    .then(()=>location.reload());
}

// CHECKOUT ANIMATION
function checkout(){

    document.getElementById("loader").style.display="block";

    setTimeout(()=>{
        window.location.href="/checkout";
    },2000);
}

</script>

</body>
</html>
