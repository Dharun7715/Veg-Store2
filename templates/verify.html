<!DOCTYPE html>
<html>
<head>
    <title>Verify OTP</title>
    <style>
        body {
            background: linear-gradient(to right, #56ab2f, #a8e063);
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            width: 300px;
        }

        .hint {
            font-size: 14px;
            color: gray;
        }

        input {
            width: 80%;
            padding: 10px;
            text-align: center;
        }

        button {
            margin-top: 10px;
            padding: 10px;
            background: green;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>🔐 Verify OTP</h2>

    <p>OTP sent to {{ session['phone'] }}</p>
    <p class="hint">Enter your last 4 digits as OTP</p>

    <form method="POST">
        <input type="text" name="otp" maxlength="4" required>
        <br>
        <button type="submit">Verify</button>
    </form>
</div>

</body>
</html>
