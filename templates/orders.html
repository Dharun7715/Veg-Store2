<!DOCTYPE html>
<html>
<head>
<title>My Orders</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#141e30,#243b55);
    color: white;
}

.container {
    max-width: 500px;
    margin: auto;
    padding: 15px;
}

h2 {
    text-align: center;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(10px);
    padding: 15px;
    border-radius: 15px;
    margin-top: 15px;
}

/* TITLE */
.title {
    font-weight: bold;
}

/* PRICE */
.price {
    color: #2ecc71;
    font-weight: bold;
}

/* STATUS */
.status {
    margin-top: 8px;
    font-size: 14px;
}

/* PROGRESS BAR */
.progress {
    width: 100%;
    height: 8px;
    background: #ccc;
    border-radius: 10px;
    margin-top: 10px;
}

.bar {
    height: 100%;
    background: #2ecc71;
    border-radius: 10px;
}

/* BUTTON */
.btn {
    display: block;
    text-align: center;
    margin-top: 10px;
    padding: 10px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
}

/* TRACK */
.track {
    background: linear-gradient(90deg,#00c853,#2ecc71);
    color: white;
}

/* BACK */
.back {
    text-align: center;
    display: block;
    margin-top: 15px;
    color: white;
    opacity: 0.7;
}

</style>
</head>

<body>

<div class="container">

<h2>📦 My Orders</h2>

{% if orders %}

{% for o in orders %}

<div class="card">

<div class="title">
🛒 {{ o[2] }} × {{ o[3] }}
</div>

<div class="price">
₹{{ o[4] }}
</div>

<div class="status">
Status: {{ o[5] }}
</div>

<!-- PROGRESS BAR -->
<div class="progress">
<div class="bar"
style="width:
{% if o[5]=='Pending' %}25%
{% elif o[5]=='Out for Delivery' %}70%
{% elif o[5]=='Delivered' %}100%
{% else %}40%
{% endif %}
">
</div>
</div>

<!-- TRACK BUTTON -->
{% if o[5] != 'Delivered' %}
<a href="/track" class="btn track">
📍 Track Order
</a>
{% endif %}

</div>

{% endfor %}

{% else %}

<p style="text-align:center;">No orders yet 😢</p>

{% endif %}

<a href="/" class="back">⬅ Back to Home</a>

</div>

</body>
</html>
