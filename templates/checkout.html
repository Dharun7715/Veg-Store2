<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#141e30,#243b55);
    color: white;
}

.container {
    max-width: 420px;
    margin: auto;
    padding: 15px;
}

h2 {
    text-align: center;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    padding: 20px;
    border-radius: 18px;
    margin-top: 15px;
}

/* ROW */
.row {
    display: flex;
    justify-content: space-between;
    margin: 12px 0;
}

/* COLORS */
.discount { color: lightgreen; }
.delivery { color: #00e676; }
.final {
    font-size: 20px;
    font-weight: bold;
    color: #2ecc71;
}

/* BUTTON */
.btn {
    display: block;
    width: 100%;
    padding: 14px;
    border-radius: 15px;
    text-align: center;
    text-decoration: none;
    margin-top: 15px;
    font-weight: bold;
}

.upi {
    background: linear-gradient(90deg,#00c853,#2ecc71);
}

.cod {
    background: linear-gradient(90deg,#ff9800,#ff5722);
}

.note {
    text-align: center;
    font-size: 13px;
    margin-top: 10px;
}

.back {
    display: block;
    text-align: center;
    margin-top: 15px;
    color: white;
}

</style>
</head>

<body>

<div class="container">

<h2>💳 Checkout</h2>

<div class="card">

<div class="row">
<span>Total Amount</span>
<span>₹{{ total }}</span>
</div>

<div class="row">
<span>Distance</span>
<span>{{ distance }} km</span>
</div>

<div class="row delivery">
<span>Delivery Charge</span>
<span>₹{{ delivery }}</span>
</div>

{% if discount > 0 %}
<div class="row discount">
<span>Discount</span>
<span>-₹{{ discount }}</span>
</div>
{% endif %}

<hr>

<div class="row final">
<span>Final Payable</span>
<span>₹{{ final_total }}</span>
</div>

</div>

<!-- UPI -->
<a class="btn upi"
href="upi://pay?pa=8838145515@ybl&pn=GreenBasket&am={{ final_total }}&cu=INR">
📱 Pay via UPI
</a>

<!-- COD -->
<a href="/success" class="btn cod">
💵 Cash on Delivery
</a>

<div class="note">
✔️ Secure Payment  
✔️ Fast Delivery 🚚  
✔️ No hidden charges
</div>

<a href="/cart" class="back">⬅ Back to Cart</a>

</div>

</body>
</html>
