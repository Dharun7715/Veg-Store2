<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 300px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #ddd;
            margin: auto;
            margin-bottom: 15px;
            font-size: 30px;
            line-height: 80px;
        }

        h2 {
            margin: 10px 0;
        }

        .phone {
            color: gray;
            margin-bottom: 20px;
        }

        a {
            display: block;
            margin: 10px 0;
            padding: 10px;
            background: #6c5ce7;
            color: white;
            text-decoration: none;
            border-radius: 10px;
        }

        a:hover {
            background: #4834d4;
        }
    </style>
</head>

<body>

<div class="card">

    <div class="avatar">👤</div>

    <h2>My Profile</h2>

    <div class="phone">
        {{ user }}
    </div>

    <a href="/">🏠 Home</a>
    <a href="/orders">📦 My Orders</a>
    <a href="/cart">🛒 Cart</a>
    <a href="/logout">🚪 Logout</a>

</div>

</body>
</html>
