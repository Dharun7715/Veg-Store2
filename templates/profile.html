<!DOCTYPE html>
<html>
<head>
<title>Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#667eea,#764ba2);
}

.container {
    max-width: 420px;
    margin: auto;
    padding: 20px;
    text-align: center;
}

/* CARD */
.card {
    background: white;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    animation: fadeIn 0.5s ease;
}

/* TITLE */
h2 {
    color: white;
}

/* TEXT */
.info {
    font-size: 16px;
    margin: 10px 0;
}

.phone {
    font-size: 18px;
    font-weight: bold;
    color: #27ae60;
}

/* BUTTONS */
.btn {
    display: block;
    margin-top: 10px;
    padding: 10px;
    border-radius: 10px;
    text-decoration: none;
    color: white;
}

.home { background: green; }
.orders { background: orange; }
.logout { background: red; }

/* ANIMATION */
@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">

<h2>👤 My Profile</h2>

<div class="card">

<p class="info">📱 Phone Number</p>
<p class="phone">{{ user }}</p>

<p class="info">Welcome back to Veg Store 🥦</p>

<hr>

<!-- EXTRA DETAILS -->
<p class="info">🛒 Items in Cart: {{ session.get('cart')|length }}</p>

</div>

<!-- ACTION BUTTONS -->
<a href="/" class="btn home">🏠 Home</a>
<a href="/orders" class="btn orders">📦 My Orders</a>
<a href="/logout" class="btn logout">🚪 Logout</a>

</div>

</body>
</html>
