<!DOCTYPE html>
<html>
<head>
<title>Wallet</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#141e30,#243b55);
    color: white;
}

/* CONTAINER */
.container {
    max-width: 420px;
    margin: auto;
    padding: 15px;
    text-align: center;
}

/* TITLE */
h2 {
    margin-bottom: 10px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    padding: 20px;
    border-radius: 18px;
    margin-top: 15px;
}

/* BALANCE */
.balance {
    font-size: 30px;
    font-weight: bold;
    color: #2ecc71;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
    background: linear-gradient(90deg,#00c853,#2ecc71);
    color: white;
    font-weight: bold;
}

/* QUICK BUTTONS */
.quick {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
}

.quick button {
    width: 23%;
    background: #3498db;
}

/* BACK */
.back {
    display: block;
    margin-top: 20px;
    color: white;
    text-decoration: none;
}

</style>
</head>

<body>

<div class="container">

<h2>💰 Wallet</h2>

<div class="card">
<p>Available Balance</p>
<div class="balance">₹{{ balance }}</div>
</div>

<div class="card">

<form method="POST" action="/add_money">

<input type="number" name="amount" id="amount" placeholder="Enter amount" required>

<div class="quick">
<button type="button" onclick="setAmt(100)">100</button>
<button type="button" onclick="setAmt(200)">200</button>
<button type="button" onclick="setAmt(500)">500</button>
<button type="button" onclick="setAmt(1000)">1000</button>
</div>

<button type="submit">Add Money</button>

</form>

</div>

<a href="/" class="back">⬅ Back to Home</a>

</div>

<script>
function setAmt(val){
    document.getElementById("amount").value = val;
}
</script>

</body>
</html>
