<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
<style>
body {
    font-family: Arial;
    background: #2c3e50;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: white;
    padding: 25px;
    border-radius: 10px;
    text-align: center;
}

input {
    display: block;
    margin: 10px 0;
    padding: 8px;
    width: 200px;
}

button {
    padding: 8px 15px;
    background: green;
    color: white;
    border: none;
}
</style>
</head>

<body>

<div class="box">
<h2>Admin Login 🔐</h2>

<form method="POST">
<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>

<button>Login</button>
</form>
</div>

</body>
</html>
