<!DOCTYPE html>
<html>
<head>
    <title>Payment</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 320px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(40px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        h2 {
            margin-bottom: 10px;
        }

        .amount {
            font-size: 22px;
            margin: 15px 0;
            color: #27ae60;
            font-weight: bold;
        }

        .btn {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .upi {
            background: #2ecc71;
            color: white;
        }

        .upi:hover {
            background: #27ae60;
            transform: scale(1.05);
        }

        .cod {
            background: #f39c12;
            color: white;
        }

        .cod:hover {
            background: #e67e22;
            transform: scale(1.05);
        }

        .note {
            font-size: 13px;
            color: gray;
            margin-top: 10px;
        }

        .pulse {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>

<body>

<div class="card">

    <h2>💳 Secure Payment</h2>

    <div class="amount">
        ₹{{ total }}
    </div>

    <!-- UPI BUTTON -->
    <button class="btn upi pulse" onclick="payUPI()">
        Pay via UPI 📱
    </button>

    <!-- COD BUTTON -->
    <form action="/success">
        <button class="btn cod">
            Cash on Delivery 💵
        </button>
    </form>

    <div class="note">
        Fast • Secure • Trusted 🚀
    </div>

</div>

<script>
function payUPI() {
    let amount = "{{ total }}";

    let upi = "upi://pay?pa=8838145515@ybl&pn=VegStore&am=" + amount + "&cu=INR";

    window.location.href = upi;
}

// Desktop warning
if (!/Android|iPhone/i.test(navigator.userAgent)) {
    alert("📱 Open this page on mobile for UPI payment");
}
</script>

</body>
</html>
