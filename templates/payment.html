<!DOCTYPE html>
<html>
<head>
<title>Payment</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #11998e, #38ef7d);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: white;
    padding: 25px;
    border-radius: 20px;
    width: 320px;
    text-align: center;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
}

.price-box {
    background: #f8f8f8;
    padding: 15px;
    border-radius: 15px;
    margin: 15px 0;
}

.final {
    font-size: 20px;
    font-weight: bold;
    color: #27ae60;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    cursor: pointer;
}

/* UPI */
.upi {
    background: #2ecc71;
    color: white;
}

/* COD */
.cod {
    background: #f39c12;
    color: white;
}

.auto {
    background: #eafaf1;
    padding: 10px;
    border-radius: 10px;
    color: green;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="card">

<h2>💳 Payment</h2>

<div class="price-box">
    <p>Total: ₹{{ total }}</p>
    <p style="color:red;">Discount: -₹{{ discount }}</p>
    <p class="final">Final: ₹{{ final_total }}</p>
</div>

<div class="auto">
🎟️ SAVE100 coupon applied automatically
</div>

{% if msg %}
<p>{{ msg }}</p>
{% endif %}

<p style="color:green;">🚚 Free Delivery</p>

<!-- UPI -->
<button class="upi" onclick="payUPI()">📱 Pay via UPI</button>

<!-- COD -->
<form action="/success">
<button class="cod">Cash on Delivery 💵</button>
</form>

</div>

<script>
function payUPI(){
    let amount = "{{ final_total }}";
    let upi = "upi://pay?pa=8838145515@ybl&pn=VegStore&am=" + amount + "&cu=INR";
    window.location.href = upi;
}
</script>

</body>
</html>
