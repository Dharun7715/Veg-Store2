<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#00c6ff,#0072ff);
    color: white;
    text-align: center;
}

.box {
    margin-top: 120px;
}

input {
    padding: 12px;
    width: 250px;
    border-radius: 12px;
    border: none;
    outline: none;
}

button {
    margin-top: 15px;
    padding: 12px 20px;
    border-radius: 12px;
    border: none;
    background: green;
    color: white;
    font-size: 16px;
}

</style>
</head>

<body>

<div class="box">

<h2>📱 Login</h2>

<form method="POST">
<input type="text" name="phone" placeholder="Enter phone number" required>
<br>
<button type="submit">Send OTP</button>
</form>

</div>

</body>
</html>
